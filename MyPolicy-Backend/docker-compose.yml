services:

  config-service:
    image: tanusmita/config-service
    container_name: config-service
    ports:
      - "8889:8888"
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 3

  discovery-service:
    image: tanusmita/discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      - config-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 3

  customer-service:
    image: tanusmita/customer-service
    container_name: customer-service
    ports:
      - "8081:8081"
    depends_on:
      - config-service
      - discovery-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb+srv://praticks2003_db_user:cPZqSJF3LPPsHSEv@cluster0.enwyvnr.mongodb.net/?retryWrites=true&w=majority
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 3

  policy-service:
    image: tanusmita/policy-service
    container_name: policy-service
    ports:
      - "8085:8085"
    depends_on:
      - config-service
      - discovery-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb+srv://praticks2003_db_user:cPZqSJF3LPPsHSEv@cluster0.enwyvnr.mongodb.net/?retryWrites=true&w=majority
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 3

  data-pipeline-service:
    image: tanusmita/data-pipeline-service
    container_name: data-pipeline-service
    ports:
      - "8082:8082"
    depends_on:
      - config-service
      - discovery-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      SPRING_DATA_MONGODB_URI: mongodb+srv://praticks2003_db_user:cPZqSJF3LPPsHSEv@cluster0.enwyvnr.mongodb.net/?retryWrites=true&w=majority
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 3

  bff-service:
    image: tanusmita/bff-service
    container_name: bff-service
    ports:
      - "8090:8090"
    depends_on:
      - config-service
      - discovery-service
      - customer-service
      - policy-service
      - data-pipeline-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://admin:config123@config-service:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - mypolicy-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 3

  frontend:
    image: tanusmita/mypolicy-frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - bff-service
    networks:
      - mypolicy-net

networks:
  mypolicy-net:
    driver: bridge